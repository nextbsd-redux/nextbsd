# freebsd-launchd-mach — loader settings for the GPT disk image.
#
# A loader.conf.d fragment: the loader reads /boot/loader.conf then
# every /boot/loader.conf.d/*.conf, so this layers cleanly on top of
# the base FreeBSD loader.conf without clobbering it. The kernel mounts
# the freebsd-ufs partition read-write as / directly (vfs.root.mountfrom
# below) and execs /sbin/launchd as PID 1 — no cd9660, no uzip, no
# unionfs, no ramdisk pivot, no rc.d.

# Disk drivers — preloaded so the kernel can reach the root partition
# at vfs_mountroot time regardless of how the disk is attached: qemu
# virtio, VirtualBox / real-hardware AHCI, NVMe, or LSI RAID. Harmless
# if the running kernel already has any of them built in.
ahci_load="YES"
nvme_load="YES"
virtio_load="YES"
virtio_pci_load="YES"
virtio_blk_load="YES"
virtio_scsi_load="YES"
mfi_load="YES"

# mach.ko — out-of-tree Mach IPC kernel module from src/mach_kmod/.
# Preloaded so Mach syscalls are available before any userland starts.
mach_load="YES"

# PID 1 = launchd. The kernel execs it directly. No /rescue/init
# fallback — the boot path is purely launchd, no rc.d anywhere.
init_path="/sbin/launchd"

# Root = the freebsd-ufs partition, located by the UFS label "ROOTFS"
# baked in by makefs — independent of the disk's device name (ada0 /
# vtbd0 / da0 / nvd0). The FreeBSD kernel always mounts / read-only and
# discards a "rw" option here, so there is none: launchd PID 1 remounts
# / read-write itself before starting any daemon.
vfs.root.mountfrom="ufs:/dev/ufs/ROOTFS"

# Console: no explicit console/comconsole settings — the UEFI/BIOS
# default consoles work for laptops and VMs. CI re-enables the serial
# console at the loader OK prompt via tests/boot-test.sh before `boot`.
beastie_disable="YES"
autoboot_delay="2"

# nvidia-drm.ko reads this kenv at kmod-init time; harmless on systems
# without Nvidia hardware (kmodloader won't load nvidia-drm anyway).
hw.nvidiadrm.modeset="1"
