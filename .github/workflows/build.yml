name: ci

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - 'NOTICE'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - 'NOTICE'
  # Rebuild the ISO when the from-source base it ingests changes. Sent by
  # nextbsd-freebsd-compat at the end of a successful main base build, which
  # is itself triggered by the toolchain on a releng/15.0 update. Full chain:
  # releng/15.0 -> toolchain -> compat -> (base-updated) -> nextbsd.
  repository_dispatch:
    types: [base-updated]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build (FreeBSD ${{ matrix.variant }} ${{ matrix.arch }})
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # `freebsd` is what vmactions/freebsd-vm expects as its release
        # tag (a bare "15.0" — it doesn't accept "-RELEASE" / "-STABLE"
        # suffixes). `variant` is what build.sh + the driverpkgs-*.txt
        # filename use to distinguish release trains (15.0-RELEASE vs.
        # 15-STABLE vs. 16.0-CURRENT). The matrix entries below pair
        # them; add a new include block when vmactions gains support
        # for snapshot builds or when CI gains a non-vmactions runner.
        include:
          - freebsd: '15.0'
            variant: '15.0-RELEASE'
            arch: 'amd64'
    steps:
      - uses: actions/checkout@v4

      - name: free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: cache FreeBSD distfiles
        uses: actions/cache@v4
        with:
          path: distfiles
          key: distfiles-${{ matrix.variant }}-${{ matrix.arch }}-${{ hashFiles('pkglist.txt', format('driverpkgs-{0}.txt', matrix.variant)) }}

      # Compute the datestamp once on the host and pass it into the VM, so
      # the built file (NextBSD-<arch>-<date>.img.zip), the workflow
      # artifact name, and the published continuous asset all agree.
      - name: compute build date
        id: meta
        run: echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      # Pull the from-source base artifact from nextbsd-freebsd-compat into the
      # workspace ($ROOT/base-artifact/), which vmactions rsyncs into the VM.
      # build.sh lays this down as the ENTIRE rootfs (overlay-first: zero
      # pkgbase; pkg bootstraps on our own base). Needs DISPATCH_TOKEN
      # (cross-repo artifact read). amd64 only for now.
      - name: download nextbsd base artifact
        if: matrix.arch == 'amd64'
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          RUN_ID=$(gh run list -R nextbsd-redux/nextbsd-freebsd-compat \
            -w "Build NextBSD Base (curated)" --branch main --status success \
            --limit 1 --json databaseId -q '.[0].databaseId')
          echo "nextbsd-freebsd-compat run: ${RUN_ID:-<none>}"
          if [ -n "$RUN_ID" ]; then
            gh run download "$RUN_ID" -R nextbsd-redux/nextbsd-freebsd-compat \
              -n nextbsd-base-amd64 -D base-artifact
            ls -lh base-artifact/
          else
            echo "ERROR: no successful compat main run — overlay-first needs the base artifact" >&2
            exit 1
          fi

      # Pull the NEXTBSD kernel (ident NEXTBSD, = GENERIC) from nextbsd-kernel,
      # replacing the pkgbase FreeBSD-kernel-generic. The nextbsd-kernel-<arch>
      # artifact is the obj subtree down to sys/NEXTBSD/ — it contains both the
      # built `kernel` and the opt_*.h build dir that mach.ko must compile
      # against (KBI match). build.sh installs it to /boot/kernel/kernel and
      # points the mach.ko build at it. amd64 only for now.
      - name: download NEXTBSD kernel artifact
        if: matrix.arch == 'amd64'
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          KRUN=$(gh run list -R nextbsd-redux/nextbsd-kernel \
            -w "Build NextBSD Kernel" --branch main --status success \
            --limit 1 --json databaseId -q '.[0].databaseId')
          echo "nextbsd-kernel run: ${KRUN:-<none>}"
          if [ -n "$KRUN" ]; then
            gh run download "$KRUN" -R nextbsd-redux/nextbsd-kernel \
              -n nextbsd-kernel-amd64 -D kernel-artifact
            echo "kernel artifact tree (sys/NEXTBSD):"
            find kernel-artifact -maxdepth 6 -name kernel -path '*sys/NEXTBSD*' -o -name 'opt_global.h' 2>/dev/null | head
          else
            echo "ERROR: no successful nextbsd-kernel main run — cannot ingest kernel" >&2
            exit 1
          fi

      # Pull the NEXTBSD module tree (cd9660, zfs, drm, sound, NICs, ...) from
      # nextbsd-kernel-modules — these are the GENERIC modules that were shipped
      # by FreeBSD-kernel-generic but aren't built into the kernel. build.sh
      # installs the *.ko into /boot/kernel and regenerates linker.hints.
      # Non-fatal if absent: the kernel boots on built-in drivers regardless.
      - name: download NEXTBSD modules artifact
        if: matrix.arch == 'amd64'
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          MRUN=$(gh run list -R nextbsd-redux/nextbsd-kernel-modules \
            -w "Build NextBSD Modules" --branch main --status success \
            --limit 1 --json databaseId -q '.[0].databaseId')
          echo "nextbsd-kernel-modules run: ${MRUN:-<none>}"
          if [ -n "$MRUN" ]; then
            gh run download "$MRUN" -R nextbsd-redux/nextbsd-kernel-modules \
              -n nextbsd-modules-amd64 -D modules-artifact || \
              echo "WARN: module artifact download failed; kernel boots on built-ins"
            echo "module .ko count: $(find modules-artifact -name '*.ko' 2>/dev/null | wc -l)"
          else
            echo "WARN: no successful nextbsd-kernel-modules main run; shipping kernel built-ins only"
          fi

      - name: build ISO inside FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: ${{ matrix.freebsd }}
          # mem: 8192 / cpu: 4 are pinned by the build-on-low-end-systems
          # rule. The original swift-foundation-icu OOM was at default
          # ninja -j$(nproc)=-j4: two concurrent compiles of the giant
          # icu_packaged_data.cpp TU (6-10 GB peak each from its
          # 200 MB of #include'd hex literals) blew through 8 GB. Fix
          # is at the build-tool side: build.sh caps libicu's ninja to
          # -j2 so only one giant TU runs at a time. If peak still
          # exceeds 8 GB, the proper fix is the .incbin restructure
          # (decode the hex chunks to a binary file at build time and
          # incbin them in a tiny .S, dropping compile RAM to ~150 MB).
          # Do NOT raise this ceiling without restructuring the cost.
          mem: 8192
          cpu: 4
          usesh: true
          sync: rsync
          copyback: true
          prepare: |
            pkg install -y bash git rsync zip
          run: |
            set -eu
            export FREEBSD_VERSION=${{ matrix.freebsd }}
            export FREEBSD_VARIANT=${{ matrix.variant }}
            export ARCH=${{ matrix.arch }}
            export IMG_DATE=${{ steps.meta.outputs.date }}
            export NEXTBSD_BASE_FROM_SOURCE=1   # STAGE 2: overlay from-source base
            sh build.sh

      - name: checksum + summary
        run: |
          ls -lh out/
          IMG="NextBSD-${{ matrix.arch }}-${{ steps.meta.outputs.date }}.img.zip"
          ( cd out && sha256sum "$IMG" > "$IMG.sha256" )
          cat "out/$IMG.sha256"

      # compression-level: 0 — the .img.zip is already DEFLATE-9; the outer
      # artifact wrapper just stores it (no recompression). GitHub always
      # wraps an uploaded artifact in its own <name>.zip on download, so the
      # content stays a single dated NextBSD-<arch>-<date>.img.zip inside —
      # the exact file the release job publishes to `continuous`, no rename.
      - uses: actions/upload-artifact@v4
        with:
          name: NextBSD-${{ matrix.arch }}-${{ steps.meta.outputs.date }}
          path: |
            out/NextBSD-${{ matrix.arch }}-${{ steps.meta.outputs.date }}.img.zip
            out/NextBSD-${{ matrix.arch }}-${{ steps.meta.outputs.date }}.img.zip.sha256
          compression-level: 0
          retention-days: 14
          if-no-files-found: error

  test:
    name: test (FreeBSD ${{ matrix.variant }} ${{ matrix.arch }})
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - freebsd: '15.0'
            variant: '15.0-RELEASE'
            arch: 'amd64'
    steps:
      - uses: actions/checkout@v4

      # Download whatever the build job produced (the dated diskimg
      # artifact) and locate the image by glob — avoids threading the
      # datestamp across jobs.
      - uses: actions/download-artifact@v4
        with:
          path: out/
          merge-multiple: true

      - name: install qemu + expect
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-x86 expect ovmf

      - name: boot test
        run: |
          chmod +x tests/boot-test.sh
          IMG=$(ls out/NextBSD-*.img.zip)
          ./tests/boot-test.sh "$IMG"

      - name: dump [T39/T41] trace from boot log
        if: always()
        run: |
          if [ -f tests/boot.log ]; then
            echo "=== [T39] / [T41] launchd diagnostic trace ==="
            grep -E '\[T39-|\[T41' tests/boot.log | head -300 || true
            echo "=== end trace ==="
          fi

  release:
    name: release (FreeBSD ${{ matrix.variant }} ${{ matrix.arch }})
    needs: [build, test]
    # Only publish when both jobs pass on a push to main. PRs and other
    # branches build + test but never publish.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - freebsd: '15.0'
            variant: '15.0-RELEASE'
            arch: 'amd64'
    steps:
      - uses: actions/checkout@v4

      # Pull the dated diskimg artifact as-built — its NextBSD-<arch>-<date>.img.zip
      # is already the final published name, so there is nothing to rename
      # or recompute here; publish it straight to `continuous`.
      - uses: actions/download-artifact@v4
        with:
          path: out/
          merge-multiple: true

      - name: list release assets
        run: ls -lh out/NextBSD-*.img.zip out/NextBSD-*.img.zip.sha256

      # `gh release create` wedges silently on big ISO uploads (single PUT,
      # no chunking, no retry). softprops/action-gh-release uses Octokit's
      # chunked upload with retries -- canonical path for big release assets.
      # Delete previous continuous release first so old assets don't pile up.
      #
      # NOTE: when matrix grows to multiple cells (e.g. adding aarch64 or a
      # zlib variant), this delete will race across cells. At that point
      # refactor to a single non-matrix release job that downloads all
      # artifacts and publishes them together.
      - name: delete previous continuous release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete continuous --yes --cleanup-tag \
            --repo "$GITHUB_REPOSITORY" || true

      - name: publish to continuous release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: Continuous build
          body: |
            Rolling continuous build. Refreshed automatically every push to
            `main` after the build + boot smoke-test both pass.

            Build log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Commit: ${{ github.sha }}
          prerelease: true
          target_commitish: ${{ github.sha }}
          fail_on_unmatched_files: true
          files: |
            out/NextBSD-*.img.zip
            out/NextBSD-*.img.zip.sha256
