name: ci

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - 'NOTICE'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - 'NOTICE'
  # Rebuild the ISO when the from-source base it ingests changes. Sent by
  # nextbsd-freebsd-compat at the end of a successful main base build, which
  # is itself triggered by the toolchain on a releng/15.0 update. Full chain:
  # releng/15.0 -> toolchain -> compat -> (base-updated) -> nextbsd.
  repository_dispatch:
    types: [base-updated]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Decide whether the heavy ISO build is needed. Deny-by-default: the build
  # runs UNLESS every changed file is under tests/ (the boot harness). Any
  # non-tests/ file (src/, overlays/, build.sh, config/, pkglists, ...) forces
  # a full build, so a mixed harness+code change is never boot-tested against a
  # stale image. A tests-only change skips the ~17-min build and boots the
  # latest published continuous ISO instead. workflow_dispatch /
  # repository_dispatch / force-push always build.
  changes:
    name: changes (decide whether to rebuild)
    runs-on: ubuntu-latest
    outputs:
      build_needed: ${{ steps.detect.outputs.build_needed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: detect changed paths
        id: detect
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -eu
          force() { echo "==> forcing full build ($1)"; echo "build_needed=true" >> "$GITHUB_OUTPUT"; exit 0; }
          case "$EVENT" in
            pull_request)
              [ -n "${BASE_SHA:-}" ] || force "no base sha"
              git fetch --no-tags --depth=1 origin "$BASE_SHA" 2>/dev/null || true
              changed=$(git diff --name-only "$BASE_SHA" HEAD) || force "diff failed"
              ;;
            push)
              case "${BEFORE:-}" in
                ""|0000000000000000000000000000000000000000) force "new/force push" ;;
              esac
              changed=$(git diff --name-only "$BEFORE" "$AFTER") || force "diff failed"
              ;;
            *)
              force "$EVENT" ;;
          esac
          echo "changed files:"; printf '%s\n' "$changed"
          # List the changed files that are NOT under tests/. Capture (not
          # `grep -q`): grep -q exits on first match and SIGPIPEs the feeding
          # printf, which under bash pipefail would falsely fail the pipeline
          # and mis-skip a mixed change. grep -v reads all input; || true
          # absorbs "no matches".
          nontests=$(printf '%s\n' "$changed" | grep -vE '^tests/' || true)
          if [ -z "$changed" ] || [ -n "$nontests" ]; then
            need=true   # empty diff (safe default) or a non-tests/ file -> full build
          else
            need=false  # tests/ only -> skip build, boot the continuous ISO
          fi
          echo "build_needed=$need" >> "$GITHUB_OUTPUT"
          echo "==> build_needed=$need"

  build:
    name: build (FreeBSD ${{ matrix.variant }} ${{ matrix.arch }})
    needs: changes
    if: needs.changes.outputs.build_needed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # `freebsd` is what vmactions/freebsd-vm expects as its release
        # tag (a bare "15.0" — it doesn't accept "-RELEASE" / "-STABLE"
        # suffixes). `variant` is what build.sh + the driverpkgs-*.txt
        # filename use to distinguish release trains (15.0-RELEASE vs.
        # 15-STABLE vs. 16.0-CURRENT). The matrix entries below pair
        # them; add a new include block when vmactions gains support
        # for snapshot builds or when CI gains a non-vmactions runner.
        include:
          - freebsd: '15.0'
            variant: '15.0-RELEASE'
            arch: 'amd64'
    steps:
      - uses: actions/checkout@v4

      - name: free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: cache FreeBSD distfiles
        uses: actions/cache@v4
        with:
          path: distfiles
          key: distfiles-${{ matrix.variant }}-${{ matrix.arch }}-${{ hashFiles('pkglist.txt', format('driverpkgs-{0}.txt', matrix.variant)) }}

      # Compute the datestamp once on the host and pass it into the VM, so
      # the built file (NextBSD-<arch>-<date>.img.zip), the workflow
      # artifact name, and the published continuous asset all agree.
      - name: compute build date
        id: meta
        run: echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      # Pull the from-source base artifact from nextbsd-freebsd-compat into the
      # workspace ($ROOT/base-artifact/), which vmactions rsyncs into the VM.
      # build.sh lays this down as the ENTIRE rootfs (overlay-first: zero
      # pkgbase; pkg bootstraps on our own base). Needs DISPATCH_TOKEN
      # (cross-repo artifact read). amd64 only for now.
      - name: download nextbsd base from compat continuous release
        if: matrix.arch == 'amd64'
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          mkdir -p base-artifact
          # Ingest the CI-gated base from nextbsd-freebsd-compat's rolling
          # `continuous` release (always present; only a green main build
          # refreshes it). Same tarball + path build.sh already expects, so the
          # overlay-first rootfs lay-down is unchanged.
          gh release download continuous \
            -R nextbsd-redux/nextbsd-freebsd-compat \
            --pattern "nextbsd-base-${{ matrix.arch }}.tar.gz" \
            --dir base-artifact --clobber
          ls -lh base-artifact/

      # Pull the NEXTBSD kernel (ident NEXTBSD, = GENERIC) from nextbsd-kernel,
      # replacing the pkgbase FreeBSD-kernel-generic. The nextbsd-kernel-<arch>
      # artifact is the obj subtree down to sys/NEXTBSD/ — it contains both the
      # built `kernel` and the opt_*.h build dir that mach.ko must compile
      # against (KBI match). build.sh installs it to /boot/kernel/kernel and
      # points the mach.ko build at it. amd64 only for now.
      - name: download NEXTBSD kernel from kernel continuous release
        if: matrix.arch == 'amd64'
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          mkdir -p kernel-artifact
          gh release download continuous \
            -R nextbsd-redux/nextbsd-kernel \
            --pattern "nextbsd-kernel-${{ matrix.arch }}.tar.gz" \
            --output /tmp/nextbsd-kernel.tar.gz --clobber
          # The asset is the sys/NEXTBSD obj subtree (kernel + opt_*.h), tarred
          # in-container so the kernel's exec bit survives. Extract it to
          # reproduce the tree build.sh locates via `find ... -name kernel`.
          tar -C kernel-artifact -xzf /tmp/nextbsd-kernel.tar.gz
          echo "kernel artifact tree (sys/NEXTBSD):"
          find kernel-artifact -name kernel -path '*sys/NEXTBSD*' -o -name 'opt_global.h' 2>/dev/null | head

      # Pull driver kexts (IntelWiFi.kext, ... with bundled firmware) from the
      # nextbsd-kernel-modules continuous release; build.sh installs them into
      # /System/Library/Extensions. The legacy GENERIC .ko module tree is no
      # longer shipped — /boot/kernel holds only the kernel, and drivers come as
      # kexts (the kernel boots on its built-in drivers regardless).
      - name: download NEXTBSD driver kexts from modules continuous release
        if: matrix.arch == 'amd64'
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          # Driver-kext tarballs, extracted + installed inside the VM by build.sh
          # (the build.sh loop installs every kext-dl/*.tar.gz it finds). Each is
          # non-fatal if absent (ISO just ships without that driver kext).
          # Iterate over full asset stems: most are <driver>-kext, but the
          # drm-kmod graphics stack ships as one graphics-kexts (plural — it is
          # IOGraphics/DMABuf/TTM drm core + IntelGraphics/AMDGraphics/
          # RadeonGraphics, each with its bundled vendor firmware).
          mkdir -p kext-dl
          for asset in intelwifi-kext intelethernet-kext graphics-kexts; do
            if gh release download continuous \
                 -R nextbsd-redux/nextbsd-kernel-modules \
                 --pattern "${asset}.tar.gz" \
                 --output "kext-dl/${asset}.tar.gz" --clobber; then
              echo "kext tarball: $(ls -lh kext-dl/${asset}.tar.gz | awk '{print $5}')"
            else
              echo "WARN: no ${asset}.tar.gz asset; ISO ships without it"
            fi
          done

      - name: build ISO inside FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: ${{ matrix.freebsd }}
          # mem: 8192 / cpu: 4 are pinned by the build-on-low-end-systems
          # rule. The original swift-foundation-icu OOM was at default
          # ninja -j$(nproc)=-j4: two concurrent compiles of the giant
          # icu_packaged_data.cpp TU (6-10 GB peak each from its
          # 200 MB of #include'd hex literals) blew through 8 GB. Fix
          # is at the build-tool side: build.sh caps libicu's ninja to
          # -j2 so only one giant TU runs at a time. If peak still
          # exceeds 8 GB, the proper fix is the .incbin restructure
          # (decode the hex chunks to a binary file at build time and
          # incbin them in a tiny .S, dropping compile RAM to ~150 MB).
          # Do NOT raise this ceiling without restructuring the cost.
          mem: 8192
          cpu: 4
          usesh: true
          sync: rsync
          copyback: true
          prepare: |
            pkg install -y bash git rsync zip
          run: |
            set -eu
            export FREEBSD_VERSION=${{ matrix.freebsd }}
            export FREEBSD_VARIANT=${{ matrix.variant }}
            export ARCH=${{ matrix.arch }}
            export IMG_DATE=${{ steps.meta.outputs.date }}
            export NEXTBSD_BASE_FROM_SOURCE=1   # STAGE 2: overlay from-source base
            sh build.sh

      - name: checksum + summary
        run: |
          ls -lh out/
          IMG="NextBSD-${{ matrix.arch }}-${{ steps.meta.outputs.date }}.img.zip"
          ( cd out && sha256sum "$IMG" > "$IMG.sha256" )
          cat "out/$IMG.sha256"

      # compression-level: 0 — the .img.zip is already DEFLATE-9; the outer
      # artifact wrapper just stores it (no recompression). GitHub always
      # wraps an uploaded artifact in its own <name>.zip on download, so the
      # content stays a single dated NextBSD-<arch>-<date>.img.zip inside —
      # the exact file the release job publishes to `continuous`, no rename.
      - uses: actions/upload-artifact@v4
        with:
          name: NextBSD-${{ matrix.arch }}-${{ steps.meta.outputs.date }}
          path: |
            out/NextBSD-${{ matrix.arch }}-${{ steps.meta.outputs.date }}.img.zip
            out/NextBSD-${{ matrix.arch }}-${{ steps.meta.outputs.date }}.img.zip.sha256
          compression-level: 0
          retention-days: 14
          if-no-files-found: error

  test:
    name: test (FreeBSD ${{ matrix.variant }} ${{ matrix.arch }})
    needs: [changes, build]
    # Run after a real build, OR when the build was skipped for a tests-only
    # change (then we boot the latest published continuous ISO). Do NOT run if
    # the build actually failed.
    #
    # #83: SKIP the boot test on push-to-main. A push to main is the merge of a
    # PR that already passed this exact boot test on its merge ref — re-running
    # it only re-exposes the flaky qemu-serial loader handshake (it has bitten
    # several merges while the identical code passed in-PR). We still boot-test
    # on pull_request (the gate) and on repository_dispatch (the base-updated
    # cascade has no PR, so it must be tested).
    if: "!cancelled() && needs.changes.result == 'success' && (needs.build.result == 'success' || needs.build.result == 'skipped') && github.event_name != 'push'"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - freebsd: '15.0'
            variant: '15.0-RELEASE'
            arch: 'amd64'
    steps:
      - uses: actions/checkout@v4

      # Image source depends on whether the build ran:
      #  - build ran: download whatever the build job produced (the dated
      #    diskimg artifact), located by glob (avoids threading the datestamp).
      #  - build skipped (tests-only change): pull the latest published
      #    continuous ISO so the harness change is validated against the
      #    current known-good image.
      - name: download built image (artifact)
        if: needs.changes.outputs.build_needed == 'true'
        uses: actions/download-artifact@v4
        with:
          path: out/
          merge-multiple: true

      - name: download latest continuous ISO (build skipped)
        if: needs.changes.outputs.build_needed != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p out
          gh release download continuous \
            --repo "$GITHUB_REPOSITORY" \
            --pattern 'NextBSD-*.img.zip' \
            --dir out/ --clobber
          ls -lh out/

      - name: install qemu + expect
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-x86 expect ovmf

      - name: boot test
        run: |
          chmod +x tests/boot-test.sh
          IMG=$(ls out/NextBSD-*.img.zip)
          ./tests/boot-test.sh "$IMG"

      - name: dump [T39/T41] trace from boot log
        if: always()
        run: |
          if [ -f tests/boot.log ]; then
            echo "=== [T39] / [T41] launchd diagnostic trace ==="
            grep -E '\[T39-|\[T41' tests/boot.log | head -300 || true
            echo "=== end trace ==="
          fi

  release:
    name: release (FreeBSD ${{ matrix.variant }} ${{ matrix.arch }})
    needs: [build, test]
    # Publish on main from a push to this repo or an upstream cascade
    # (repository_dispatch: base-updated). PRs and other branches never publish.
    #
    # #83: the boot `test` is SKIPPED on push-to-main (it already passed in-PR),
    # so this gate can't require test=success on a push — it would never run.
    # Instead: publish when build succeeded AND test either passed (dispatch
    # cascade) OR was skipped (push). always() is required so a skipped `test`
    # need doesn't auto-skip release. A failed build still blocks publish; a
    # tests-only push (build skipped) yields build.result!='success' -> no
    # republish, which is correct.
    if: ${{ always() && github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'repository_dispatch') && needs.build.result == 'success' && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - freebsd: '15.0'
            variant: '15.0-RELEASE'
            arch: 'amd64'
    steps:
      - uses: actions/checkout@v4

      # Pull the dated diskimg artifact as-built — its NextBSD-<arch>-<date>.img.zip
      # is already the final published name, so there is nothing to rename
      # or recompute here; publish it straight to `continuous`.
      - uses: actions/download-artifact@v4
        with:
          path: out/
          merge-multiple: true

      - name: list release assets
        run: ls -lh out/NextBSD-*.img.zip out/NextBSD-*.img.zip.sha256

      # `gh release create` wedges silently on big ISO uploads (single PUT,
      # no chunking, no retry). softprops/action-gh-release uses Octokit's
      # chunked upload with retries -- canonical path for big release assets.
      # Delete previous continuous release first so old assets don't pile up.
      #
      # NOTE: when matrix grows to multiple cells (e.g. adding aarch64 or a
      # zlib variant), this delete will race across cells. At that point
      # refactor to a single non-matrix release job that downloads all
      # artifacts and publishes them together.
      - name: delete previous continuous release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete continuous --yes --cleanup-tag \
            --repo "$GITHUB_REPOSITORY" || true

      - name: publish to continuous release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: Continuous build
          body: |
            Rolling continuous build. Refreshed automatically every push to
            `main` after the build + boot smoke-test both pass.

            Build log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Commit: ${{ github.sha }}
          prerelease: true
          target_commitish: ${{ github.sha }}
          fail_on_unmatched_files: true
          files: |
            out/NextBSD-*.img.zip
            out/NextBSD-*.img.zip.sha256
